<!DOCTYPE html>
<html lang='es'>
<head>
  <meta charset='UTF-8'>
  <title>BotonPrincipal</title>
  <style>
    .botonprincipal {
      width: 200px;
      height: 50px;
      background-color: rgb(0, 120, 212);
      font-family: Arial, sans-serif;
      font-size: 16px;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }
    .botonprincipal:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <button class='botonprincipal'>BotonPrincipal</button>
</body>
</html>
